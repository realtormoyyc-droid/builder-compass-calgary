<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calgary Builder Compass</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A94E; --black: #0A0A0A; --card: #1A1A1A; --gray: #CCC; --light-gray: #999;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: var(--black); color: var(--gray); min-height: 100vh; }
.header { background: var(--black); border-bottom: 1px solid #333; padding: 20px 30px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: 'Playfair Display'; font-size: 24px; font-weight: 700; color: white; }
.logo span { color: var(--gold); }
.nav { display: flex; gap: 20px; }
.nav-btn { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 14px; padding: 8px 16px; border-radius: 6px; transition: 0.3s; }
.nav-btn:hover { color: var(--gold); background: #222; }
.nav-btn.active { color: var(--gold); background: rgba(201,169,78,0.1); }
.hero { background: var(--black); padding: 50px 30px; text-align: center; }
.hero h1 { font-family: 'Playfair Display'; font-size: 40px; color: white; margin-bottom: 10px; }
.hero h1 span { color: var(--gold); }
.hero p { color: var(--light-gray); margin-bottom: 30px; }
.search-box { max-width: 600px; margin: 0 auto 30px; }
.search-box input { width: 100%; padding: 14px 20px; background: #1A1A1A; border: 1px solid #444; border-radius: 8px; color: white; font-size: 14px; }
.search-box input:focus { outline: none; border-color: var(--gold); }
.stats { display: flex; justify-content: center; gap: 40px; }
.stat { text-align: center; }
.stat-num { font-size: 28px; font-weight: 700; color: var(--gold); }
.stat-label { font-size: 12px; color: var(--light-gray); margin-top: 5px; }
.main { max-width: 1400px; margin: 0 auto; padding: 40px 30px; }
.section-title { font-family: 'Playfair Display'; font-size: 28px; color: white; margin-bottom: 30px; }
.section-title span { color: var(--gold); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.builder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
.builder-card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; cursor: pointer; transition: 0.3s; }
.builder-card:hover { border-color: var(--gold); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(201,169,78,0.1); }
.card-header { display: flex; gap: 12px; margin-bottom: 15px; }
.card-logo { width: 48px; height: 48px; background: linear-gradient(135deg, var(--gold), #A88B2F); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--black); flex-shrink: 0; }
.card-info h3 { font-size: 16px; color: white; margin-bottom: 2px; }
.card-info p { font-size: 12px; color: var(--light-gray); }
.card-rating { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.stars { color: var(--gold); font-size: 13px; letter-spacing: 2px; }
.rating-num { font-size: 14px; font-weight: 600; color: var(--gold); }
.card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 0; border-top: 1px solid #333; border-bottom: 1px solid #333; margin-bottom: 10px; }
.stat-item { font-size: 12px; }
.stat-label { color: var(--light-gray); margin-bottom: 2px; }
.stat-val { color: white; font-weight: 600; }
.card-footer { display: flex; justify-content: space-between; align-items: center; }
.btn-view { background: none; border: 1px solid #444; color: var(--light-gray); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.3s; }
.btn-view:hover { border-color: var(--gold); color: var(--gold); }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: var(--card); border: 1px solid #333; border-radius: 12px; max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto; padding: 30px; position: relative; }
.modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--gray); font-size: 24px; cursor: pointer; }
.modal-close:hover { color: var(--gold); }
.modal-section { margin-bottom: 20px; }
.modal-section-title { font-size: 14px; color: var(--gold); font-weight: 600; text-transform: uppercase; margin-bottom: 10px; }
.review { background: #111; border-left: 3px solid var(--gold); padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
.no-results { text-align: center; padding: 60px 20px; }
.no-results h3 { color: var(--light-gray); margin-bottom: 10px; }
@media (max-width: 768px) {
  .nav { display: none; }
  .hero h1 { font-size: 24px; }
  .builder-grid { grid-template-columns: 1fr; }
  .stats { flex-direction: column; gap: 20px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">Builder<span>Compass</span></div>
    <nav class="nav">
      <button class="nav-btn active" onclick="switchTab('builders')">Builders</button>
      <button class="nav-btn" onclick="switchTab('communities')">Communities</button>
      <button class="nav-btn" onclick="switchTab('trends')">Trends</button>
    </nav>
  </div>
</header>

<section class="hero" id="heroSection">
  <h1>Calgary's <span>Builder Intelligence</span> Platform</h1>
  <p>Compare 25+ builders with ratings, reviews, investment outlooks & current incentives</p>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search builders..." oninput="handleSearch()">
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-num">25+</div><div class="stat-label">Builders</div></div>
    <div class="stat"><div class="stat-num">500+</div><div class="stat-label">Reviews</div></div>
    <div class="stat"><div class="stat-num">40+</div><div class="stat-label">Incentives</div></div>
    <div class="stat"><div class="stat-num">35+</div><div class="stat-label">Communities</div></div>
  </div>
</section>

<div class="main">
  <div class="tab-content active" id="tab-builders">
    <div class="section-title">Calgary <span>Home Builders</span></div>
    <div class="builder-grid" id="builderGrid"></div>
    <div class="no-results" id="noResults" style="display:none;"><h3>No builders found</h3></div>
  </div>

  <div class="tab-content" id="tab-communities">
    <div class="section-title">Top <span>Communities</span></div>
    <div id="communitiesContent"></div>
  </div>

  <div class="tab-content" id="tab-trends">
    <div class="section-title">Market <span>Trends</span></div>
    <div id="trendsContent"></div>
  </div>
</div>

<div class="modal" id="modal" onclick="if(event.target===this) closeModal()">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const builders = [
  {id: 1, name: "Morrison Homes", initials: "MH", phone: "403-250-1190", website: "morrisonhomes.ca", rating: 4.6, trust: 94, buildQuality: 4.5, afterSales: 4.6, service: 4.7, value: 4.4, reviews: [{title: "Exceptional quality", text: "Selection Studio was amazing. Build quality is excellent."}], issues: [{issue: "Premium Pricing", desc: "30-40% higher than volume builders."}], incentives: [{title: "Design Credit", value: "$15,000", expiry: "May 2026"}], communities: ["Cornerstone", "Livingston", "Seton", "Legacy"], priceRange: "$380K–$950K"},
  {id: 2, name: "Jayman BUILT", initials: "JB", phone: "403-250-0580", website: "jayman.com", rating: 4.5, trust: 91, buildQuality: 4.6, afterSales: 4.3, service: 4.4, value: 4.3, reviews: [{title: "Free solar panels", text: "10-panel solar system included. Excellent value for green homes."}], issues: [{issue: "Solar warranty", desc: "Limited warranty after 10-15 years."}], incentives: [{title: "Free Solar", value: "10-panel system", expiry: "Ongoing"}], communities: ["Livingston", "Cornerstone", "Rangeview", "Wolf Willow"], priceRange: "$420K–$900K"},
  {id: 3, name: "Trico Homes", initials: "TH", phone: "403-301-3460", website: "tricohomes.com", rating: 4.5, trust: 89, buildQuality: 4.5, afterSales: 4.4, service: 4.6, value: 4.3, reviews: [{title: "B Corp certified", text: "Values-aligned builder. Modern designs and community-focused."}], issues: [{issue: "Mid-market pricing", desc: "Not budget-friendly for entry-level buyers."}], incentives: [{title: "Move-In Ready", value: "Up to $20K", expiry: "April 2026"}], communities: ["Belmont", "Savanna", "Carrington", "Rangeview", "Huxley", "Ambleridge"], priceRange: "$400K–$1.1M"},
  {id: 4, name: "Shane Homes", initials: "SH", phone: "403-536-2700", website: "shanehomes.com", rating: 4.3, trust: 83, buildQuality: 4.3, afterSales: 4.2, service: 4.4, value: 4.5, reviews: [{title: "Great value", text: "Affordable entry-level to estate homes. Reliable builder."}], issues: [{issue: "Quality variance", desc: "Varies by site manager. Some homes better finished than others."}], incentives: [{title: "Laned Homes", value: "From $340s", expiry: "Ongoing"}], communities: ["Livingston", "Glacier Ridge", "Carrington", "Cornerstone", "Ambleton", "Ambleridge"], priceRange: "$340K–$850K"},
  {id: 5, name: "Calbridge Homes", initials: "CB", phone: "403-258-1499", website: "calbridgehomes.com", rating: 4.5, trust: 90, buildQuality: 4.7, afterSales: 4.4, service: 4.5, value: 4.1, reviews: [{title: "Luxury excellence", text: "78 Design Studio is incredible. Premium finishings unmatched."}], issues: [{issue: "Premium pricing", desc: "30-50% more expensive than volume builders."}], incentives: [{title: "Design Credit", value: "$20K", expiry: "June 2026"}], communities: ["Harmony", "Watermark", "West Grove", "Mahogany", "Cochrane", "Bearspaw"], priceRange: "$500K–$1.5M"},
  {id: 6, name: "Sterling Homes", initials: "ST", phone: "403-727-0222", website: "sterlingcalgary.com", rating: 4.2, trust: 82, buildQuality: 4.2, afterSales: 4.1, service: 4.3, value: 4.6, reviews: [{title: "Best value", text: "Qualico-backed. Affordable with solid warranty backing."}], issues: [{issue: "Cost-cutting", desc: "Basic finishings on budget models. Upgrades get expensive."}], incentives: [{title: "Up to $100K", value: "Builder + GST rebate", expiry: "April 2026"}], communities: ["Belmont", "Homestead", "Lewiston", "Logan Landing", "Pine Creek", "Ambleridge"], priceRange: "$350K–$750K"},
  {id: 7, name: "Mattamy Homes", initials: "MA", phone: "403-536-3800", website: "mattamyhomes.com", rating: 4.2, trust: 85, buildQuality: 4.3, afterSales: 4.0, service: 4.1, value: 4.3, reviews: [{title: "Mortgage coverage", text: "First year mortgage paid by builder. Game-changing incentive."}], issues: [{issue: "Prefab untested", desc: "Long-term durability of prefab homes not yet proven."}], incentives: [{title: "Mortgage Coverage", value: "12 months", expiry: "Limited time"}], communities: ["Carrington", "Cityscape", "Yorkville", "Seton"], priceRange: "$400K–$800K"},
  {id: 8, name: "Cedarglen Homes", initials: "CG", phone: "403-250-9575", website: "cedarglenhomes.com", rating: 4.4, trust: 86, buildQuality: 4.5, afterSales: 4.3, service: 4.4, value: 4.3, reviews: [{title: "SE specialist", text: "Calgary-based with excellent SE community presence and design."}], issues: [{issue: "Limited regions", desc: "Primarily focused on SE communities."}], incentives: [{title: "Spring Promo", value: "$15K credit", expiry: "May 2026"}], communities: ["Seton", "Mahogany", "Legacy", "Logan Landing", "Livingston"], priceRange: "$420K–$900K"},
  {id: 9, name: "Excel Homes", initials: "EH", phone: "403-250-2860", website: "excelhomes.ca", rating: 4.2, trust: 81, buildQuality: 4.2, afterSales: 4.1, service: 4.2, value: 4.5, reviews: [{title: "Eco-friendly affordable", text: "Green building at middle-market prices. Modern layouts."}], issues: [{issue: "Less visible", desc: "Smaller marketing presence than national brands."}], incentives: [{title: "Rangeview Launch", value: "$18K savings", expiry: "May 2026"}], communities: ["Cornerstone", "Savanna", "Rangeview", "Belmont", "Airdrie"], priceRange: "$370K–$700K"},
  {id: 10, name: "Genesis Builders", initials: "GB", phone: "403-537-0543", website: "genesisbuilds.com", rating: 4.1, trust: 79, buildQuality: 4.1, afterSales: 4.0, service: 4.2, value: 4.4, reviews: [{title: "Best value", text: "Genesis Land integration = consistent value pricing."}], issues: [{issue: "Newer company", desc: "Only 20 years old. Long-term reputation still building."}], incentives: [{title: "Lewiston Launch", value: "From $340s", expiry: "Summer 2026"}], communities: ["Lewiston", "Logan Landing", "Airdrie", "Sage Meadows"], priceRange: "$340K–$700K"}
];

let searchTerm = '';

function getStars(rating) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.3;
  let s = '';
  for (let i = 0; i < full; i++) s += '★';
  if (half) s += '½';
  return s;
}

function handleSearch() {
  searchTerm = document.getElementById('searchInput').value.toLowerCase();
  renderBuilders();
}

function renderBuilders() {
  const filtered = builders.filter(b =>
    b.name.toLowerCase().includes(searchTerm) ||
    b.communities.some(c => c.toLowerCase().includes(searchTerm))
  );

  const grid = document.getElementById('builderGrid');
  const noResults = document.getElementById('noResults');

  if (filtered.length === 0) {
    grid.style.display = 'none';
    noResults.style.display = 'block';
    return;
  }

  grid.style.display = 'grid';
  noResults.style.display = 'none';
  grid.innerHTML = filtered.map(b => `
    <div class="builder-card" onclick="openModal(${b.id})">
      <div class="card-header">
        <div class="card-logo">${b.initials}</div>
        <div class="card-info">
          <h3>${b.name}</h3>
          <p>${b.communities[0]}</p>
        </div>
      </div>
      <div class="card-rating">
        <span class="stars">${getStars(b.rating)}</span>
        <span class="rating-num">${b.rating}/5</span>
      </div>
      <div class="card-stats">
        <div class="stat-item"><div class="stat-label">Build Quality</div><div class="stat-val">${b.buildQuality}/5</div></div>
        <div class="stat-item"><div class="stat-label">After-Sales</div><div class="stat-val">${b.afterSales}/5</div></div>
        <div class="stat-item"><div class="stat-label">Service</div><div class="stat-val">${b.service}/5</div></div>
        <div class="stat-item"><div class="stat-label">Value</div><div class="stat-val">${b.value}/5</div></div>
      </div>
      <div class="card-footer">
        <span style="font-size: 13px; color: var(--light-gray);">${b.priceRange}</span>
        <button class="btn-view" onclick="event.stopPropagation(); openModal(${b.id})">View</button>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  const b = builders.find(x => x.id === id);
  const modal = document.getElementById('modal');
  const body = document.getElementById('modalBody');

  body.innerHTML = `
    <h2 style="color: white; margin-bottom: 10px;">${b.name}</h2>
    <p style="color: var(--light-gray); margin-bottom: 20px;">Trust Score: <strong>${b.trust}/100</strong> | Rating: <strong>${getStars(b.rating)} ${b.rating}/5</strong></p>

    <div class="modal-section">
      <div class="modal-section-title">Reviews</div>
      ${b.reviews.map(r => `<div class="review"><strong>${r.title}</strong><br>${r.text}</div>`).join('')}
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Common Issues</div>
      ${b.issues.map(i => `<div style="background: #111; border-left: 3px solid #F87171; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 13px;"><strong>${i.issue}</strong><br>${i.desc}</div>`).join('')}
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Current Incentives</div>
      ${b.incentives.map(i => `<div style="background: rgba(201,169,78,0.1); border-left: 3px solid var(--gold); padding: 10px; border-radius: 6px; margin-bottom: 8px;"><strong>${i.title}</strong><br><span style="color: var(--gold); font-weight: 600;">${i.value}</span><br><span style="font-size: 11px; color: var(--light-gray);">Expires: ${i.expiry}</span></div>`).join('')}
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Contact</div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <a href="tel:${b.phone}" style="display: inline-block; background: var(--gold); color: var(--black); padding: 8px 14px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 13px;">📞 Call</a>
        <a href="https://${b.website}" target="_blank" style="display: inline-block; background: var(--gold); color: var(--black); padding: 8px 14px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 13px;">🌐 Website</a>
      </div>
    </div>
  `;

  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));

  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');

  if (tab === 'builders') {
    document.getElementById('heroSection').style.display = 'block';
  } else {
    document.getElementById('heroSection').style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', renderBuilders);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
